<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    :root {
      --bg: #0e1116;
      --surface: #161b22;
      --surface2: #1d242e;
      --border: #2a323d;
      --text: #e8eaed;
      --muted: #8b94a3;
      --red: #e5352b;
      --red-hi: #ff5a50;
      --ok: #36d399;
    }
    * { box-sizing: border-box; }
    body {
      font: 13px/1.45 -apple-system, "Segoe UI", Roboto, sans-serif;
      margin: 0; width: 330px; background: var(--bg); color: var(--text);
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 14px; background: linear-gradient(180deg, #161b22, #11151b);
      border-bottom: 1px solid var(--border);
    }
    .brand .bars { display: flex; align-items: flex-end; gap: 3px; height: 22px; position: relative; }
    .brand .bars i { width: 5px; background: #c9d1da; border-radius: 2px; display: block; }
    .brand .bars i:nth-child(1) { height: 12px; background: #6b7686; }
    .brand .bars i:nth-child(2) { height: 22px; }
    .brand .bars i:nth-child(3) { height: 9px; background: #6b7686; }
    .brand .clamp {
      position: absolute; left: -3px; right: -3px; top: 9px; height: 6px;
      background: var(--red); border-radius: 3px;
      box-shadow: 0 0 8px rgba(229,53,43,.6);
    }
    .brand h1 { font-size: 15px; font-weight: 700; margin: 0; letter-spacing: .3px; }
    .brand .tag { font-size: 10px; color: var(--muted); margin-top: 1px; text-transform: uppercase; letter-spacing: 1px; }
    .body { padding: 12px 14px 14px; }
    .meta { color: var(--muted); font-size: 11px; margin-bottom: 10px; word-break: break-all; }
    .meta b { color: var(--text); }
    .scope {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px; margin-bottom: 10px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    }
    .scope label { flex: 1; font-size: 12px; }
    .scope .pill { font-size: 9px; color: var(--red-hi); border: 1px solid var(--red); border-radius: 10px; padding: 1px 6px; }
    .row { display: flex; align-items: center; gap: 8px; margin: 7px 0; }
    .row label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
    .row input[type=number] {
      width: 70px; padding: 5px 7px; background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px; text-align: right;
    }
    .row input[type=number]:focus { outline: none; border-color: var(--red); }
    input[type=checkbox] { accent-color: var(--red); width: 15px; height: 15px; }
    .hint { color: var(--muted); font-size: 10.5px; margin: 10px 0 0; }
    .actions { display: flex; gap: 8px; margin-top: 14px; }
    button {
      flex: 1; padding: 8px 10px; cursor: pointer; border-radius: 7px;
      border: 1px solid var(--border); background: var(--surface2); color: var(--text);
      font-weight: 600; font-size: 12px;
    }
    button:hover { border-color: #3a4452; }
    button.primary { background: var(--red); border-color: var(--red); color: #fff; }
    button.primary:hover { background: var(--red-hi); border-color: var(--red-hi); }
    button:disabled { opacity: .5; cursor: default; }
    #status { font-size: 11px; min-height: 14px; margin-top: 8px; color: var(--ok); }
    #empty { color: var(--red-hi); font-size: 12px; }
    code { background: var(--surface2); padding: 0 4px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="brand">
    <div class="bars"><i></i><i></i><i></i><span class="clamp"></span></div>
    <div>
      <h1>GRIDLOCK</h1>
      <div class="tag">Halo Column Control</div>
    </div>
  </div>
  <div class="body">
    <div class="meta" id="meta">Reading current list…</div>
    <div id="empty" style="display:none;">
      Open a Halo service desk list (a page with <code>viewid</code> in the URL) and reopen this popup.
    </div>
    <div class="scope" id="scopeRow">
      <label for="globalToggle">Apply to <b>all lists</b> (global)</label>
      <span class="pill">GLOBAL</span>
      <input type="checkbox" id="globalToggle" />
    </div>
    <div id="cols"></div>
    <div class="hint">Width in px. Blank or 0 = unpinned (Halo default). Per-list overrides global.</div>
    <div class="actions">
      <button class="primary" id="save">Save &amp; Lock</button>
      <button id="clear">Unpin all</button>
    </div>
    <div id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
